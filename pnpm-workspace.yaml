packages:
  - "workers/*"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - mppx
  - vocs
  - vite
  - waku
blockExoticSubdeps: true
strictDepBuilds: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
ignoredBuiltDependencies:
  - es5-ext
  - simple-git-hooks
  - vue-demi
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
overrides:
  "@babel/core": 7.29.6
  dompurify: 3.4.11
  esbuild: 0.28.1
  js-yaml: 4.2.0
  qs: 6.15.2
  undici: 6.27.0
  ws: 8.21.0
