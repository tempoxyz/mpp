name: Deploy MPP Discovery Service MCP

on:
  push:
    branches: [main]
    paths:
      - "workers/mcp-services/**"
      - "src/lib/datadog*.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mcp-services-deploy.yml"
  workflow_dispatch:

concurrency:
  group: mcp-services-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  deploy:
    name: mpp-services-mcp
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm mcp-services:check
      - name: Check Cloudflare deploy environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "CLOUDFLARE_ACCOUNT_ID GitHub Environment variable is required"
            exit 1
          }
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "CLOUDFLARE_API_TOKEN GitHub Environment secret is required"
            exit 1
          }
      - name: Deploy Worker
        run: pnpm mcp-services:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
