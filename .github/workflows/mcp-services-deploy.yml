name: Deploy MPP Discovery Service MCP

on:
  push:
    branches: [main]
    paths:
      - "workers/mcp-services/**"
      - "src/lib/worker-metrics*.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mcp-services-deploy.yml"
  workflow_dispatch:

concurrency:
  group: mcp-services-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  deploy:
    name: mpp-services-mcp
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm mcp-services:check
      - name: Check Cloudflare deploy environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "CLOUDFLARE_ACCOUNT_ID GitHub Environment variable is required"
            exit 1
          }
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "CLOUDFLARE_API_TOKEN GitHub Environment secret is required"
            exit 1
          }
      - name: Deploy Worker
        run: pnpm mcp-services:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
