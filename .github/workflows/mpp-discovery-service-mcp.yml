name: MPP Discovery Service MCP

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mpp-discovery-service-mcp
  cancel-in-progress: false

env:
  MPP_DISCOVERY_MCP_URL: https://mpp.dev/mcp/services

jobs:
  health:
    name: Production health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Check Slack webhook
        run: |
          test -n "$SLACK_WEBHOOK_URL" || {
            echo "SLACK_WEBHOOK_URL_ENG_DEVELOPERS_MONITOR is required"
            exit 1
          }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_ENG_DEVELOPERS_MONITOR }}

      - name: Run health check
        run: node scripts/check-mpp-discovery-service-mcp.mjs
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_ENG_DEVELOPERS_MONITOR }}
